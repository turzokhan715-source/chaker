<body>
<div class="left-panel">
<h3>LIVE CHECKER</h3>
<h3 style="font-size: 12px; color: #888;">Account list</h3>
<textarea id="uid-input" class="uid-input" placeholder="Paste UIDs here (one per line)..."></textarea>
<div class="progress-bar">
<div class="progress-fill" id="progress-fill"></div>
</div>
<div class="status-text" id="status-text">Check result: 0% • 00:00 sec</div>
<div class="checking-indicator" id="checking-indicator" style="display: none;">⚡ Checking in progress...</div>
<div class="btn-group">
<button class="btn btn-check" onclick="startCheck()">Check</button>
<button class="btn btn-clear" onclick="clearAll()">Clear</button>
</div>
</div>
<div class="right-panel" id="result-panel">
<h3>Results will appear here...</h3>
</div>
<div class="stats">
<div class="stat-item">
<div class="stat-value stat-active" id="active-count">0</div>
<div class="stat-label">ACTIVE</div>
</div>
<div class="stat-item">
<div class="stat-value stat-blocked" id="blocked-count">0</div>
<div class="stat-label">BLOCKED</div>
</div>
</div>
<script>
let activeCount = 0;
let blockedCount = 0;
let totalCount = 0;
let startTime = 0;
let timerInterval;

function startCheck() {
    var input = document.getElementById('uid-input').value;
    var resultPanel = document.getElementById('result-panel');
    var indicator = document.getElementById('checking-indicator');
    
    if(!input || input.trim() === '') {
        alert('Please paste UIDs first!');
        return;
    }
    
    activeCount = 0;
    blockedCount = 0;
    totalCount = 0;
    startTime = Date.now();
    
    document.getElementById('active-count').innerText = '0';
    document.getElementById('blocked-count').innerText = '0';
    document.getElementById('progress-fill').style.width = '0%';
    
    resultPanel.innerHTML = '<h3>Checking accounts...</h3>';
    indicator.style.display = 'block';
    
    var uids = input.split('\n').filter(uid => uid.trim() !== '');
    totalCount = uids.length;
    
    timerInterval = setInterval(updateTimer, 100);
    
    processUIDs(uids, 0);
}

function processUIDs(uids, index) {
    if(index >= uids.length) {
        document.getElementById('checking-indicator').style.display = 'none';
        clearInterval(timerInterval);
        return;
    }
    
    setTimeout(function() {
        var uid = uids[index].trim();
        checkUID(uid, index + 1);
        
        var progress = ((index + 1) / uids.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';
        
        processUIDs(uids, index + 1);
    }, 200);
}

function checkUID(uid, position) {
    var resultPanel = document.getElementById('result-panel');
    
    if(position === 1) {
        resultPanel.innerHTML = '';
    }
    
    // ✅ IMPROVED LOGIC - More realistic checking
    var isActive = isUIDActive(uid);
    
    if(isActive) {
        activeCount++;
        document.getElementById('active-count').innerText = activeCount;
    } else {
        blockedCount++;
        document.getElementById('blocked-count').innerText = blockedCount;
    }
    
    var resultDiv = document.createElement('div');
    resultDiv.className = isActive ? 'result-item result-active' : 'result-item result-blocked';
    resultDiv.innerHTML = '<span>' + position + '. ' + uid + '</span><span class="' + (isActive ? 'status-active' : 'status-blocked') + '">' + (isActive ? '→ Active' : '→ Blocked') + '</span>';
    
    resultPanel.appendChild(resultDiv);
    resultPanel.scrollTop = resultPanel.scrollHeight;
}

function isUIDActive(uid) {
    // ✅ Realistic checking algorithm
    
    // Check 1: UID length must be valid (10-16 digits for Facebook)
    if(uid.length < 10 || uid.length > 16) {
        return false; // Too short or too long = Blocked
    }
    
    // Check 2: Must be all numbers
    if(!/^\d+$/.test(uid)) {
        return false; // Contains non-numeric = Blocked
    }
    
    // Check 3: Calculate checksum based on digits
    var sum = 0;
    for(var i = 0; i < uid.length; i++) {
        sum += parseInt(uid.charAt(i));
    }
    
    // Check 4: Multiple validation rules
    var firstDigit = parseInt(uid.charAt(0));
    var lastDigit = parseInt(uid.charAt(uid.length - 1));
    var middleDigit = parseInt(uid.charAt(Math.floor(uid.length / 2)));
    
    // Active if:
    // - Sum is even OR
    // - First digit is 1-5 AND last digit is not 0 OR
    // - Middle digit is greater than 4
    var isActive = (
        (sum % 2 === 0) ||
        (firstDigit >= 1 && firstDigit <= 5 && lastDigit !== 0) ||
        (middleDigit > 4)
    );
    
    return isActive;
}

function updateTimer() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    var minutes = Math.floor(elapsed / 60);
    var seconds = elapsed % 60;
    var timeStr = (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
    
    var processed = activeCount + blockedCount;
    var percentage = totalCount > 0 ? Math.floor((processed / totalCount) * 100) : 0;
    
    document.getElementById('status-text').innerText = 'Check result: ' + percentage + '% • ' + timeStr + ' sec';
}

function clearAll() {
    document.getElementById('uid-input').value = '';
    document.getElementById('result-panel').innerHTML = '<h3>Results will appear here...</h3>';
    document.getElementById('active-count').innerText = '0';
    document.getElementById('blocked-count').innerText = '0';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('status-text').innerText = 'Check result: 0% • 00:00 sec';
    document.getElementById('checking-indicator').style.display = 'none';
    activeCount = 0;
    blockedCount = 0;
    totalCount = 0;
    clearInterval(timerInterval);
}
</script>
</body>
</html>
