<div class="main-card">
    <h2 style="color: #4f46e5; text-align: center;">Full Access Mail Reader</h2>
    
    <label style="font-size: 11px; font-weight: 800; color: #64748b;">PASTE FULL DATA (EMAIL|PASS|TOKEN)</label>
    <textarea id="full-data" class="input-box" rows="4" placeholder="Email|Pass|Token..."></textarea>
    
    <button class="fetch-btn" id="fetch-btn" onclick="fetchLiveCode()">GET VERIFICATION CODE</button>
    
    <div class="result-area" id="res-box">
        <div id="loader" style="display:none; text-align:center; padding-top:40px;">
            <div class="spinner"></div>
            <p style="color:#94a3b8; font-size:13px;">সার্ভারের সাথে কানেক্ট করা হচ্ছে...</p>
        </div>

        <div id="code-box" style="display:none; text-align:center;">
            <span style="color:#94a3b8; font-size:12px; font-weight:800;">VERIFICATION CODE FOUND</span>
            <h1 id="live-code" style="font-size: 65px; color: #22c55e; margin: 10px 0;">000000</h1>
            <p id="live-subject" style="color: #94a3b8; font-size: 13px;"></p>
        </div>
        
        <div id="error-box" style="display:none; color:#ef4444; text-align:center; padding-top:50px;">
            লগইন ব্যর্থ হয়েছে! পাসওয়ার্ড বা টোকেন চেক করুন।
        </div>
    </div>
</div>

<style>
    /* স্পিনার ডিজাইন */
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #4f46e5; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
async function fetchLiveCode() {
    const rawData = document.getElementById('full-data').value.trim();
    const loader = document.getElementById('loader');
    const codeBox = document.getElementById('code-box');
    const errorBox = document.getElementById('error-box');
    const btn = document.getElementById('fetch-btn');

    if(!rawData) return alert("Data input korun!");

    // UI Reset
    loader.style.display = 'block';
    codeBox.style.display = 'none';
    errorBox.style.display = 'none';
    btn.disabled = true;

    try {
        // ডাটা স্প্লিট করা
        const parts = rawData.split('|');
        const email = parts[0];
        const pass = parts[1];

        /* মনোযোগ দিন: 
           ব্রাউজার সরাসরি আউটলুক লগইন করতে পারে না। 
           আপনাকে একটি 'IMAP API' ব্যবহার করতে হবে। 
           নিচে আমি একটি পাওয়ারফুল মেথড দিচ্ছি যা মেইলের ভেতরের লেটেস্ট কোডটিই খুঁজে আনবে।
        */

        // আপনার ব্যাকএন্ড এপিআই এখানে কল হবে। 
        // আপনি যদি কোনো থার্ড পার্টি এপিআই ব্যবহার করেন, তবে সেটি এখানে বসান।
        const apiUrl = `https://your-api-domain.com/get-code.php?email=${email}&pass=${pass}`;
        
        const response = await fetch(apiUrl);
        const result = await response.json();

        if(result.success) {
            document.getElementById('live-code').innerText = result.code;
            document.getElementById('live-subject').innerText = "Subject: " + result.subject;
            loader.style.display = 'none';
            codeBox.style.display = 'block';
        } else {
            throw new Error("Failed");
        }

    } catch (err) {
        // এরর হলে হ্যান্ডেল করা
        loader.style.display = 'none';
        errorBox.style.display = 'block';
    } finally {
        btn.disabled = false;
    }
}
</script>
