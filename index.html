<body>

<div class="left-panel">
    <div class="panel-header">LIVE CHECKER</div>
    <div class="info">ℹ️ No token needed - Profile URL checking</div>
    <div class="panel-header">Account list: <span id="account-count">0</span> acc.</div>
    <div class="account-list" id="account-list" contenteditable="true" spellcheck="false">Paste UIDs here...</div>
    <div class="btn-group">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-check" onclick="startCheck()">Check</button>
    </div>
</div>

<div class="middle-panel">
    <div class="status-bar">
        <span>Check result: <span id="timer">00:00 sec.</span></span>
    </div>
    <div class="result-container" id="result-container">
        <div style="color: #666; text-align: center; padding: 20px;">Results will appear here...</div>
    </div>
    <div class="progress-footer">
        <div class="progress-text" id="progress-text">0%</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
    </div>
</div>

<script>
let accounts = [];
let activeCount = 0;
let blockedCount = 0;
let startTime = 0;
let timerInterval;

document.getElementById('account-list').addEventListener('input', function() {
    var text = this.innerText;
    if(text === 'Paste UIDs here...') return;
    
    var uids = text.split('\n').filter(uid => uid.trim() !== '' && uid.trim() !== 'Paste UIDs here...');
    accounts = uids;
    document.getElementById('account-count').textContent = accounts.length;
});

function startCheck() {
    if(accounts.length === 0) {
        alert('❌ No UIDs found!\n\nPlease paste UIDs in the left panel.');
        return;
    }
    
    activeCount = 0;
    blockedCount = 0;
    startTime = Date.now();
    
    document.getElementById('result-container').innerHTML = '';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-text').textContent = '0%';
    
    timerInterval = setInterval(updateTimer, 100);
    
    processAccounts(0);
}

function processAccounts(index) {
    if(index >= accounts.length) {
        clearInterval(timerInterval);
        return;
    }
    
    var uid = accounts[index].trim();
    
    // ✅ Check using profile URL with no-cors mode
    checkUIDByURL(uid, function(isActive) {
        displayResult(uid, index + 1, isActive);
        
        var progress = ((index + 1) / accounts.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';
        document.getElementById('progress-text').textContent = progress.toFixed(2) + '%';
        
        setTimeout(function() {
            processAccounts(index + 1);
        }, 300);
    });
}

function checkUIDByURL(uid, callback) {
    // Create an image element to test if profile exists
    var img = new Image();
    var profilePicUrl = 'https://graph.facebook.com/' + uid + '/picture?type=large';
    
    img.onload = function() {
        // If image loads, profile exists = Active
        callback(true);
    };
    
    img.onerror = function() {
        // If image fails to load, profile doesn't exist = Blocked
        callback(false);
    };
    
    img.src = profilePicUrl;
    
    // Timeout after 3 seconds
    setTimeout(function() {
        if(!img.complete) {
            callback(false);
        }
    }, 3000);
}

function displayResult(uid, position, isActive) {
    if(isActive) {
        activeCount++;
    } else {
        blockedCount++;
    }
    
    var container = document.getElementById('result-container');
    var div = document.createElement('div');
    div.className = isActive ? 'result-item result-active' : 'result-item result-blocked';
    div.innerHTML = '<span>' + position + '. ' + uid + '</span><span>' + (isActive ? '→ Active' : '→ Blocked') + '</span>';
    
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function updateTimer() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    var minutes = Math.floor(elapsed / 60);
    var seconds = elapsed % 60;
    var timeStr = (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
    
    document.getElementById('timer').textContent = timeStr + ' sec.';
}

function clearAll() {
    accounts = [];
    document.getElementById('account-list').innerText = 'Paste UIDs here...';
    document.getElementById('result-container').innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">Results will appear here...</div>';
    document.getElementById('account-count').textContent = '0';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-text').textContent = '0%';
    document.getElementById('timer').textContent = '00:00 sec.';
    clearInterval(timerInterval);
}
</script>
</body>
</html>
