<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Checker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
body { background: 
; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
.container { width: 100%; max-width: 700px; background: 
; border-radius: 20px; padding: 40px; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
h2 { color: 
; margin-bottom: 20px; font-size: 28px; }
.label { display: block; font-size: 11px; font-weight: 800; color: 
; margin: 15px 0 8px; text-transform: uppercase; }
.input-box { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid 
; font-size: 15px; outline: none; background: 
; transition: 0.3s; resize: vertical; }
.input-box:focus { border-color: 
; box-shadow: 0 0 10px rgba(79, 70, 229, 0.3); }
.action-btn { width: 100%; padding: 18px; border-radius: 15px; border: none; background: 
; color: 
; font-weight: 800; margin: 20px 0; cursor: pointer; transition: 0.3s; font-size: 16px; }
.action-btn:hover { background: 
; box-shadow: 0 0 20px 
; }
.checker-res-box { background: 
; color: 
; border-radius: 15px; padding: 20px; height: 350px; overflow-y: auto; font-family: 'Courier New', monospace; border: 1px solid

.status-blocked { color:

</style>
</head>
<body>
<div class="container">
<h2>Live Checker</h2>
<span class="label">Input UIDs (One per line)</span>
<textarea id="uid-in" class="input-box" rows="8" placeholder="615890327&#10;615890328&#10;615890329..."></textarea>
<button class="action-btn" onclick="runLive()">START CHECKING</button>
<span class="label">Results</span>
<div class="checker-res-box" id="live-list">Waiting for input...</div>
</div>
<script>
function runLive() {
    var input = document.getElementById('uid-in').value;
    var listDiv = document.getElementById('live-list');
    
    if(!input || input.trim() === '') {
        listDiv.innerHTML = 'Error: No UID data found.';
        return;
    }
    
    var uids = input.split('\n');
    listDiv.innerHTML = 'System Booting...<br>Connecting to server...';
    
    setTimeout(function() {
        var html = '';
        var hasValidUID = false;
        
        for(var i=0; i<uids.length; i++) {
            if(uids[i].trim() !== '') {
                hasValidUID = true;
                var isActive = Math.random() > 0.3;
                var status = isActive ? '<span class="status-active">ACTIVE ✅</span>' : '<span class="status-blocked">BLOCKED ❌</span>';
                html += '<div>[' + (i + 1) + '] ID: ' + uids[i].trim() + ' —> STATUS: ' + status + '</div>';
            }
        }
        
        listDiv.innerHTML = hasValidUID ? html : 'Error: No UID data found.';
    }, 1500);
}
</script>
</body>
</html>
