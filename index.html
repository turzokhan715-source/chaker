            background: white;

            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;

        }
        h1 {
            color:

        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid

            border-radius: 8px;
            font-size: 14px;
            transition: border 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: 
;
        }
        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: monospace;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, 
 0%, 
 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: 
;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .otp-code {
            font-size: 32px;
            font-weight: bold;
            color: 
;
            text-align: center;
            padding: 20px;
            background: white;
            border-radius: 8px;
            margin: 10px 0;
            letter-spacing: 4px;
        }
        .error {
            color: 
;
            background: 
;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .loading {
            text-align: center;
            color: 
;
            margin-top: 20px;
            display: none;
        }
        .loading.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Outlook OTP Extractor</h1>
        <p class="subtitle">Extract Facebook/Instagram verification codes from Outlook</p>
        
        <div class="input-group">
            <label>Email:</label>
            <input type="email" id="email" placeholder="your-email@outlook.com">
        </div>
        
        <div class="input-group">
            <label>Password:</label>
            <input type="password" id="password" placeholder="Your password">
        </div>
        
        <div class="input-group">
            <label>Access Token (optional):</label>
            <input type="text" id="token" placeholder="Leave empty to use email/password">
        </div>
        
        <button id="extractBtn">Extract OTP</button>
        
        <div class="loading" id="loading">
            <p>⏳ Fetching OTP...</p>
        </div>
        
        <div class="result" id="result">
            <h3>✅ OTP Found:</h3>
            <div class="otp-code" id="otpCode"></div>
            <p style="text-align: center; color: #666;">Code copied to clipboard!</p>
        </div>
        
        <div class="error" id="error"></div>
    </div>

    <script>
        // 🚀 CHANGE THIS TO YOUR DEPLOYED BACKEND URL
        const API_URL = 'https://your-backend.onrender.com/api/get-otp';
        
        document.getElementById('extractBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const token = document.getElementById('token').value;
            
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const btn = document.getElementById('extractBtn');
            
            // Reset
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');
            btn.disabled = true;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, token })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('otpCode').textContent = data.otp;
                    result.classList.add('show');
                    
                    // Copy to clipboard
                    navigator.clipboard.writeText(data.otp);
                } else {
                    error.textContent = '❌ ' + data.error;
                    error.classList.add('show');
                }
            } catch (err) {
                error.textContent = '❌ Network error: ' + err.message;
                error.classList.add('show');
            } finally {
                loading.classList.remove('show');
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
