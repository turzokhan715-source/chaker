<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP - Mail API Reader</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #05060f; 
            color: #fff; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px; 
        }
        
        .mail-card { 
            background: #ffffff; 
            color: #1e293b; 
            width: 100%; 
            max-width: 500px; 
            padding: 30px; 
            border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(79, 70, 229, 0.3);
            text-align: center;
        }

        h2 { margin-bottom: 20px; font-weight: 800; color: #0f111a; }

        .input-group { text-align: left; margin-bottom: 20px; }
        
        label { font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-left: 5px; }

        .input-box { 
            width: 100%; padding: 15px; border-radius: 15px; border: 2px solid #e2e8f0; 
            background: #f8fafc; font-size: 15px; outline: none; margin-top: 5px;
            font-weight: 600;
        }

        .btn { 
            width: 100%; padding: 18px; border-radius: 15px; border: none; 
            background: #4f46e5; color: #fff; font-weight: 800; cursor: pointer; 
            font-size: 16px; transition: 0.3s; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.2);
        }

        .btn:hover { background: #4338ca; transform: translateY(-2px); }

        .inbox-container { 
            margin-top: 25px; background: #0f111a; border-radius: 20px; 
            height: 300px; overflow-y: auto; padding: 15px; text-align: left;
            border: 1px solid #1e293b;
        }

        .mail-item { 
            background: #161a29; padding: 15px; border-radius: 12px; 
            margin-bottom: 12px; border-left: 4px solid #4f46e5;
        }

        .mail-from { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px; }
        .mail-sub { font-size: 14px; color: #e2e8f0; font-weight: 600; }
        .fb-code { 
            display: inline-block; margin-top: 8px; background: #22c55e; 
            color: #fff; padding: 4px 12px; border-radius: 8px; font-weight: 800; font-size: 18px;
        }

        .empty-msg { color: #64748b; text-align: center; margin-top: 100px; font-size: 14px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="mail-card">
        <h2>📧 Mail API Reader</h2>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="text" id="email-addr" class="input-box" placeholder="example@1secmail.com">
        </div>

        <button class="btn" id="fetch-btn" onclick="getMessages()">FETCH INBOX</button>

        <div class="inbox-container" id="inbox">
            <div class="empty-msg">মেইল ইনপুট দিয়ে Fetch বাটনে ক্লিক করুন...</div>
        </div>
    </div>

<script>
    async function getMessages() {
        const fullEmail = document.getElementById('email-addr').value.trim();
        const inboxDiv = document.getElementById('inbox');
        const btn = document.getElementById('fetch-btn');

        if (!fullEmail || !fullEmail.includes('@')) {
            alert("সঠিক মেইল অ্যাড্রেস দিন!");
            return;
        }

        // মেইল এবং ডোমেইন আলাদা করা
        const [user, domain] = fullEmail.split('@');
        
        btn.innerText = "Checking...";
        btn.disabled = true;
        inboxDiv.innerHTML = '<div class="empty-msg">Searching for codes... 🔍</div>';

        try {
            // 1secmail API কল
            const res = await fetch(`https://www.1secmail.com/api/v1/?action=getMessages&login=${user}&domain=${domain}`);
            const messages = await res.json();

            if (messages.length === 0) {
                inboxDiv.innerHTML = '<div class="empty-msg">ইনবক্স খালি! কোনো মেইল পাওয়া যায়নি। 📩</div>';
            } else {
                inboxDiv.innerHTML = '';
                // মেসেজগুলো লুপ করে দেখানো
                for (let msg of messages) {
                    const detailRes = await fetch(`https://www.1secmail.com/api/v1/?action=readMessage&login=${user}&domain=${domain}&id=${msg.id}`);
                    const detail = await detailRes.json();

                    // ফেসবুকের ৬ ডিজিটের কোড খোঁজা
                    const codeMatch = detail.subject.match(/\d{6}/) || detail.body.match(/\d{6}/) || detail.textBody.match(/\d{6}/);
                    const codeHtml = codeMatch ? `<div class="fb-code">${codeMatch[0]}</div>` : '';

                    inboxDiv.innerHTML += `
                        <div class="mail-item">
                            <span class="mail-from">From: ${detail.from}</span>
                            <div class="mail-sub">${detail.subject}</div>
                            ${codeHtml}
                        </div>
                    `;
                }
            }
        } catch (error) {
            inboxDiv.innerHTML = '<div class="empty-msg" style="color:#ef4444;">API Error! আবার চেষ্টা করুন।</div>';
        }

        btn.innerText = "FETCH INBOX";
        btn.disabled = false;
    }
</script>

</body>
</html>
