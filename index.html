<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Longisir VIP - Pro Checker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #05060f; color: #fff; min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 850px; }
        .hidden { display: none !important; }

        /* --- হোম পেজ: জল জল (Neon Glow) এনিমেশন --- */
        .home-grid { display: flex; gap: 20px; justify-content: center; margin-top: 80px; flex-wrap: wrap; }
        .h-card { 
            background: #0f111a; border: 2px solid #1e293b; padding: 35px; border-radius: 25px; 
            text-align: center; width: 240px; cursor: pointer; transition: 0.4s;
            animation: neonPulse 2.5s infinite ease-in-out;
        }
        @keyframes neonPulse {
            0% { border-color: #1e293b; box-shadow: 0 0 5px rgba(79, 70, 229, 0.2); }
            50% { border-color: #4f46e5; box-shadow: 0 0 25px rgba(79, 70, 229, 0.7), inset 0 0 10px rgba(79, 70, 229, 0.3); }
            100% { border-color: #1e293b; box-shadow: 0 0 5px rgba(79, 70, 229, 0.2); }
        }
        .h-card:hover { transform: scale(1.05); background: #161a29; }
        .h-card span { font-size: 45px; display: block; margin-bottom: 10px; filter: drop-shadow(0 0 10px #4f46e5); }

        /* --- মেইন টুলস ডিজাইন --- */
        .card-inner { background: #fff; color: #1e293b; border-radius: 25px; padding: 20px; min-height: 520px; margin-top: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .back-btn { background: #4f46e5; color: #fff; border: none; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-weight: 700; margin-bottom: 10px; }
        
        .top-nav { background: #0f111a; padding: 6px; border-radius: 50px; display: flex; justify-content: space-around; margin-bottom: 10px; }
        .tab-btn { background: transparent; color: #94a3b8; border: none; padding: 10px 25px; border-radius: 50px; font-weight: 800; cursor: pointer; font-size: 13px; }
        .tab-btn.active { background: #fff; color: #05060f; box-shadow: 0 0 15px #fff; }

        .input-box { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; background: #f8fafc; font-size: 14px; outline: none; margin-top: 5px; }
        .action-btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #1e293b; color: #fff; font-weight: 800; cursor: pointer; margin: 15px 0; transition: 0.3s; }
        .action-btn:hover { background: #4f46e5; transform: translateY(-2px); }

        .console { background: #0b0e14; color: #38bdf8; padding: 12px; border-radius: 12px; height: 230px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 12px; border: 1px solid #1e293b; }
        .live-line { color: #22c55e; font-weight: bold; padding: 2px 0; }
        .die-line { color: #ef4444; padding: 2px 0; }

        /* --- স্ট্যাটাস ফুটার (image_2ae0dd.png Style) --- */
        .bottom-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee; }
        .stat-wrap { display: flex; gap: 8px; }
        .mini-box { background: #f1f5f9; padding: 6px 12px; border-radius: 10px; text-align: center; border: 1px solid #e2e8f0; min-width: 80px; }
        .mini-box b { display: block; font-size: 15px; line-height: 1.1; }
        .mini-box span { font-size: 9px; font-weight: 800; color: #64748b; text-transform: uppercase; }

        .icon-actions { display: flex; gap: 8px; }
        .circle-btn { background: #f1f5f9; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 10px; cursor: pointer; border: 1px solid #cbd5e1; font-size: 18px; transition: 0.2s; }
        .circle-btn:hover { background: #e2e8f0; transform: scale(1.1); }
    </style>
</head>
<body>

<div class="container">
    <!-- HOME -->
    <div id="p-home">
        <h1 style="text-align:center; font-size: 35px; margin-top: 40px; color:#fff;">Longisir VIP Hub</h1>
        <p style="text-align:center; opacity:0.5; letter-spacing:4px; font-size:11px; margin-bottom: 40px;">SECURE AUTOMATION TOOLS</p>
        <div class="home-grid">
            <div class="h-card" onclick="openTool('2fa')"><span>🔐</span><h3>2FA Auth</h3></div>
            <div class="h-card" onclick="openTool('mail')"><span>📧</span><h3>Mail API</h3></div>
            <div class="h-card" onclick="openTool('live')"><span>✅</span><h3>Live Checker</h3></div>
        </div>
    </div>

    <!-- MAIN TOOLS -->
    <div id="p-tools" class="hidden">
        <button class="back-btn" onclick="goHome()">← Back</button>
        <div class="top-nav">
            <button class="tab-btn" id="t-2fa" onclick="tab('2fa')">2FA</button>
            <button class="tab-btn" id="t-mail" onclick="tab('mail')">MAIL BOX</button>
            <button class="tab-btn" id="t-live" onclick="tab('live')">LIVE CHECKER</button>
        </div>

        <div class="card-inner">
            <!-- Checker -->
            <div id="box-live" class="hidden">
                <h3 style="margin-bottom:10px;">FB Real-Time Checker</h3>
                <textarea id="inp-uids" class="input-box" rows="5" placeholder="UID|PASS|2FA (One per line)"></textarea>
                <button class="action-btn" id="btn-run" onclick="processCheck()">START VALIDATION</button>
                <div class="console" id="log-box">Ready for scan...</div>

                <div class="bottom-bar">
                    <div class="stat-wrap">
                        <div class="mini-box" style="color:#22c55e;"><b id="stat-lp">0%</b><span id="stat-lc">0 Live</span></div>
                        <div class="mini-box" style="color:#ef4444;"><b id="stat-dp">0%</b><span id="stat-dc">0 Die</span></div>
                        <div class="mini-box" style="color:#4f46e5;"><b id="stat-total">0</b><span>Total</span></div>
                    </div>
                    <div class="icon-actions">
                        <div class="circle-btn" onclick="location.reload()" title="Refresh">🗑️</div>
                        <div class="circle-btn" onclick="downloadCSV()" title="Download CSV (Excel)">📥</div>
                    </div>
                </div>
            </div>

            <!-- 2FA & Mail (Placeholders) -->
            <div id="box-2fa" class="hidden"><h2>2FA Module Ready</h2></div>
            <div id="box-mail" class="hidden"><h2>Mail API Connected</h2></div>
        </div>
    </div>
</div>

<script>
    // আপনি যে টোকেনটি দিয়েছেন
    const TOKEN = "EAAGNO4LRfssBAK7ZA9ZA6ZAZA1ZBAZA2ZBAZA3ZBAZA4ZBAZA5ZBAZA6ZBAZA7ZBAZA8ZBAZA9ZBAZA0ZBAZA1ZBAZA2ZBAZA3ZBAZA4ZBAZA5ZBAZA6ZBAZA7ZBAZA8ZBAZA9ZBAZA0";
    let liveRecords = [];

    function openTool(x) { document.getElementById('p-home').classList.add('hidden'); document.getElementById('p-tools').classList.remove('hidden'); tab(x); }
    function goHome() { document.getElementById('p-tools').classList.add('hidden'); document.getElementById('p-home').classList.remove('hidden'); }
    function tab(x) {
        ['2fa', 'mail', 'live'].forEach(i => { document.getElementById('box-'+i).classList.add('hidden'); document.getElementById('t-'+i).classList.remove('active'); });
        document.getElementById('box-'+x).classList.remove('hidden'); document.getElementById('t-'+x).classList.add('active');
    }

    async function processCheck() {
        const input = document.getElementById('inp-uids').value.trim();
        if(!input) return;
        const lines = input.split('\n').filter(l => l.trim() !== "");
        const log = document.getElementById('log-box');
        const btn = document.getElementById('btn-run');
        
        btn.disabled = true; btn.innerText = "CHECKING...";
        log.innerHTML = "Connecting to Graph API...<br>";
        let liveCount = 0, dieCount = 0; liveRecords = [];

        for(let i=0; i<lines.length; i++) {
            const currentLine = lines[i].trim();
            const uid = currentLine.split(/[|:]/)[0].trim();

            try {
                // নিখুঁত মেথড: ইউজারের নাম চেক করা
                const res = await fetch(`https://graph.facebook.com/${uid}?fields=name&access_token=${TOKEN}`);
                const data = await res.json();

                if(data.name) {
                    liveCount++;
                    liveRecords.push(currentLine);
                    log.innerHTML += `<div class="live-line">[${i+1}] ${uid} -> LIVE ✅</div>`;
                } else {
                    dieCount++;
                    log.innerHTML += `<div class="die-line">[${i+1}] ${uid} -> DIE/BLOCK ❌</div>`;
                }
            } catch {
                dieCount++;
                log.innerHTML += `<div class="die-line">[${i+1}] ${uid} -> ERROR ❌</div>`;
            }

            // রিয়েল-টাইম স্ট্যাটাস আপডেট (image_2ae0dd.png এর মতো)
            const total = lines.length;
            document.getElementById('stat-total').innerText = total;
            document.getElementById('stat-lc').innerText = liveCount + " Live";
            document.getElementById('stat-dc').innerText = dieCount + " Die";
            document.getElementById('stat-lp').innerText = Math.round((liveCount/total)*100) + "%";
            document.getElementById('stat-dp').innerText = Math.round((dieCount/total)*100) + "%";
            log.scrollTop = log.scrollHeight;
        }
        btn.disabled = false; btn.innerText = "START VALIDATION";
    }

    function downloadCSV() {
        if(liveRecords.length === 0) return alert("No live IDs to save!");
        let csv = "UID,PASSWORD,2FA_KEY\n";
        liveRecords.forEach(line => {
            const p = line.split(/[|:]/);
            csv += `${p[0]||''},${p[1]||''},${p[2]||''}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `Longisir_Live_${Date.now()}.csv`;
        a.click();
    }
</script>
</body>
</html>
