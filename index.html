<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Code Finder Tool (Debug Mode)</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        textarea { width: 90%; height: 120px; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 13px; }
        button { background-color: #e67e22; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #d35400; }
        #code-display { margin-top: 20px; font-size: 18px; font-weight: bold; color: #28a745; min-height: 40px; white-space: pre-wrap; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>Facebook OTP Fetcher (Debug Mode)</h2>
    <textarea id="mail-input" placeholder="sylvesterfisher2001nesciunt@outlook.com|Lljyrg491l|M.C532_..."></textarea>
    <br>
    <button onclick="getFacebookCode()">Get Code & Debug</button>
    <div id="code-display">Your Code or Server Log Will Show Here</div>
</div>

<script>
const apiUrl = "https://email-reader-api--turzokhan715.replit.app/api/email/search";

async function getFacebookCode() {
    const rawData = document.getElementById('mail-input').value.trim(); 
    if (!rawData || !rawData.includes('|')) {
        alert("Please paste the full token string correctly!");
        return;
    }

    const parts = rawData.split('|');
    const userEmail = parts[0].trim();
    const userPass = parts[1].trim();

    const finalUrl = `${apiUrl}?email=${encodeURIComponent(userEmail)}&password=${encodeURIComponent(userPass)}&query=Facebook`;
    
    try {
        document.getElementById('code-display').innerText = "Testing connection...";
        document.getElementById('code-display').style.color = "#007bff";
        
        const response = await fetch(finalUrl);
        const textData = await response.text(); // সার্ভার থেকে আসা র টেক্সট বা এরর ধরবে
        
        if (response.ok) {
            try {
                const data = JSON.parse(textData);
                if (data && data.length > 0) {
                    const latestEmail = data[0];
                    const emailText = latestEmail.body || latestEmail.subject || "";
                    const codeMatch = emailText.match(/\d{6}/); 
                    if (codeMatch) {
                        document.getElementById('code-display').style.color = "#28a745";
                        document.getElementById('code-display').innerText = "OTP Code: " + codeMatch[0];
                    } else {
                        document.getElementById('code-display').style.color = "#dc3545";
                        document.getElementById('code-display').innerText = "Code not found. Server Raw Response:\n" + textData;
                    }
                } else {
                    document.getElementById('code-display').style.color = "#dc3545";
                    document.getElementById('code-display').innerText = "No emails found. Response:\n" + textData;
                }
            } catch(e) {
                document.getElementById('code-display').style.color = "#28a745";
                document.getElementById('code-display').innerText = "Success Text Response:\n" + textData;
            }
        } else {
            // ৫০০ বা অন্য কোনো এরর আসলে সার্ভার কী টেক্সট ব্যাক করছে তা এখানে দেখাবে
            document.getElementById('code-display').style.color = "#dc3545";
            document.getElementById('code-display').innerText = `Server Error (${response.status}). Full Error Log:\n${textData}`;
        }
    } catch (error) {
        document.getElementById('code-display').style.color = "#dc3545";
        document.getElementById('code-display').innerText = "Network Error: " + error.message;
    }
}
</script>

</body>
</html>
