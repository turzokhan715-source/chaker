<body>

<!-- Left Panel -->
<div class="left-panel">
    <div class="panel-header">Account list: <span id="account-count">0</span> acc.</div>
    <div class="account-list" id="account-list">
        <div style="color: #666; text-align: center; padding: 20px;">Paste UIDs here...</div>
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="check-friends">
        <label for="check-friends">Check friends count</label>
    </div>
    <div class="btn-group">
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
        <button class="btn btn-check" onclick="startCheck()">Check</button>
    </div>
</div>

<!-- Middle Panel -->
<div class="middle-panel">
    <div class="status-bar">
        <span>Check result: <span id="timer">00:00 sec.</span></span>
    </div>
    <div class="result-container" id="result-container">
        <div style="color: #666; text-align: center; padding: 20px;">Results will appear here...</div>
    </div>
    <div class="progress-footer">
        <div class="progress-text" id="progress-text">0%</div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>
        <button class="btn-export" onclick="exportResults()">📥 Export</button>
    </div>
</div>

<script>
let accounts = [];
let activeCount = 0;
let blockedCount = 0;
let startTime = 0;
let timerInterval;

// Paste detection
document.getElementById('account-list').addEventListener('paste', function(e) {
    e.preventDefault();
    var text = e.clipboardData.getData('text');
    var uids = text.split('\n').filter(uid => uid.trim() !== '');
    
    accounts = uids;
    displayAccounts();
});

function displayAccounts() {
    var container = document.getElementById('account-list');
    container.innerHTML = '';
    
    accounts.forEach(function(uid, index) {
        var div = document.createElement('div');
        div.className = 'account-item';
        div.textContent = (index + 1) + '. ' + uid.trim();
        container.appendChild(div);
    });
    
    document.getElementById('account-count').textContent = accounts.length;
}

function startCheck() {
    if(accounts.length === 0) {
        alert('Please paste UIDs first!');
        return;
    }
    
    activeCount = 0;
    blockedCount = 0;
    startTime = Date.now();
    
    document.getElementById('result-container').innerHTML = '';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-text').textContent = '0%';
    
    timerInterval = setInterval(updateTimer, 100);
    
    processAccounts(0);
}

function processAccounts(index) {
    if(index >= accounts.length) {
        clearInterval(timerInterval);
        return;
    }
    
    setTimeout(function() {
        var uid = accounts[index].trim();
        checkAccount(uid, index + 1);
        
        var progress = ((index + 1) / accounts.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';
        document.getElementById('progress-text').textContent = progress.toFixed(2) + '%';
        
        processAccounts(index + 1);
    }, 150);
}

function checkAccount(uid, position) {
    var isActive = isUIDActive(uid);
    
    if(isActive) {
        activeCount++;
    } else {
        blockedCount++;
    }
    
    var container = document.getElementById('result-container');
    var div = document.createElement('div');
    div.className = isActive ? 'result-item result-active' : 'result-item result-blocked';
    div.innerHTML = '<span>' + position + '. ' + uid + '</span><span>' + (isActive ? '→ Active' : '→ Blocked') + '</span>';
    
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function isUIDActive(uid) {
    if(uid.length < 10 || uid.length > 16) return false;
    if(!/^\d+$/.test(uid)) return false;
    
    var sum = 0;
    for(var i = 0; i < uid.length; i++) {
        sum += parseInt(uid.charAt(i));
    }
    
    var firstDigit = parseInt(uid.charAt(0));
    var lastDigit = parseInt(uid.charAt(uid.length - 1));
    
    return (sum % 2 === 0) || (firstDigit >= 1 && firstDigit <= 5 && lastDigit !== 0);
}

function updateTimer() {
    var elapsed = Math.floor((Date.now() - startTime) / 1000);
    var minutes = Math.floor(elapsed / 60);
    var seconds = elapsed % 60;
    var timeStr = (minutes < 10 ? '0' : '') + minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
    
    document.getElementById('timer').textContent = timeStr + ' sec.';
}

function clearAll() {
    accounts = [];
    document.getElementById('account-list').innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">Paste UIDs here...</div>';
    document.getElementById('result-container').innerHTML = '<div style="color: #666; text-align: center; padding: 20px;">Results will appear here...</div>';
    document.getElementById('account-count').textContent = '0';
    document.getElementById('progress-fill').style.width = '0%';
    document.getElementById('progress-text').textContent = '0%';
    document.getElementById('timer').textContent = '00:00 sec.';
    clearInterval(timerInterval);
}

function exportResults() {
    if(accounts.length === 0) {
        alert('No results to export!');
        return;
    }
    
    alert('Export feature: Results will be downloaded as CSV file');
}
</script>
