<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Code Finder Tool</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        textarea { width: 90%; height: 120px; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 13px; resize: vertical; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        #code-display { margin-top: 20px; font-size: 24px; font-weight: bold; color: #28a745; min-height: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Facebook OTP Fetcher (Secure POST Mode)</h2>
    
    <textarea id="mail-input" placeholder="sylvesterfisher2001nesciunt@outlook.com|Lljyrg491l|M.C532_..."></textarea>
    <br>
    
    <button onclick="getFacebookCode()">Get Code</button>
    
    <div id="code-display">Your Code Will Show Here</div>
</div>

<script>
// সার্চ করার জন্য এপিআই এন্ডপয়েন্ট ইউআরএল
const apiUrl = "https://email-reader-api--turzokhan715.replit.app/api/email/search";

async function getFacebookCode() {
    const rawData = document.getElementById('mail-input').value.trim(); 
    
    if (!rawData || !rawData.includes('|')) {
        alert("Please paste the full token string correctly!");
        return;
    }

    // নিখুঁতভাবে ইমেইল এবং পাসওয়ার্ড আলাদা করা হচ্ছে
    const parts = rawData.split('|');
    const userEmail = parts[0].trim();
    const userPass = parts[1].trim();

    // ইউআরএল-এর বদলে বডির ভেতরে ডাটা পাঠানোর জন্য অবজেক্ট তৈরি
    const requestData = {
        email: userEmail,
        password: userPass,
        query: "Facebook"
    };

    try {
        document.getElementById('code-display').innerText = "Connecting securely & searching code...";
        document.getElementById('code-display').style.color = "#007bff";
        
        // এখানে POST রিকোয়েস্ট পাঠানো হচ্ছে যেন স্পেশাল ক্যারেক্টার নষ্ট না হয়
        const response = await fetch(apiUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(requestData)
        });

        const data = await response.json();
        
        if (response.ok && data && data.length > 0) {
            const latestEmail = data[0];
            const emailText = latestEmail.body || latestEmail.subject || "";
            
            // ইমেইল টেক্সট থেকে ৬ সংখ্যার ওটিপি কোড খোঁজা
            const codeMatch = emailText.match(/\d{6}/); 
            
            if (codeMatch) {
                document.getElementById('code-display').style.color = "#28a745";
                document.getElementById('code-display').innerText = "OTP Code: " + codeMatch[0];
            } else {
                document.getElementById('code-display').style.color = "#dc3545";
                document.getElementById('code-display').innerText = "Code not found in the latest email!";
            }
        } else {
            document.getElementById('code-display').style.color = "#dc3545";
            document.getElementById('code-display').innerText = "No Facebook emails found or wrong credentials!";
        }
    } catch (error) {
        console.error("Error:", error);
        document.getElementById('code-display').style.color = "#dc3545";
        document.getElementById('code-display').innerText = "Server Error (500) or Connection Failed!";
    }
}
</script>

</body>
</html>
