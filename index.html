<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Code Finder - Full Access Mode</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 650px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        textarea { width: 95%; height: 140px; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 13px; }
        button { background-color: #2c3e50; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background-color: #1a252f; }
        #code-display { margin-top: 20px; font-size: 18px; font-weight: bold; color: #27ae60; min-height: 40px; white-space: pre-wrap; word-break: break-all; text-align: left; background: #fafafa; padding: 15px; border-radius: 4px; border-left: 5px solid #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h2>Facebook OTP Fetcher (Token Auth Mode)</h2>
    <textarea id="token-input" placeholder="email|password|session_token/cookie|device_id..."></textarea>
    <br>
    <button onclick="fetchWithFullAccess()">Get Facebook Code</button>
    <div id="code-display">Status and logs will appear here...</div>
</div>

<script>
const apiUrl = "https://email-reader-api--turzokhan715.replit.app/api/email/search";

async function fetchWithFullAccess() {
    const rawData = document.getElementById('token-input').value.trim(); 
    if (!rawData || !rawData.includes('|')) {
        alert("Please paste the complete validation token format correctly!");
        return;
    }

    // পাইপ ক্যারেক্টার দিয়ে স্ট্রিংটি স্প্লিট করা হচ্ছে
    const parts = rawData.split('|');
    
    if(parts.length < 3) {
        alert("The input does not seem to contain the full session token parameters.");
        return;
    }

    const email = parts[0].trim();
    const password = parts[1].trim();
    const sessionToken = parts[2].trim();
    // যদি ৪ নম্বর অংশে ডিভাইস আইডি থাকে, তা নেওয়া হবে
    const deviceId = parts[3] ? parts[3].trim() : "";

    // কুয়েরি প্যারামিটারে সম্পূর্ণ ডেটা এনকোড করে পাঠানো হচ্ছে
    const finalUrl = `${apiUrl}?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&sessionToken=${encodeURIComponent(sessionToken)}&deviceId=${encodeURIComponent(deviceId)}&query=Facebook`;
    
    try {
        document.getElementById('code-display').innerText = "Initializing connection with session token...";
        document.getElementById('code-display').style.color = "#2980b9";
        
        const response = await fetch(finalUrl);
        const textData = await response.text();
        
        try {
            const data = JSON.parse(textData);
            if (response.ok && data && data.length > 0) {
                const latestEmail = data[0];
                const emailText = latestEmail.body || latestEmail.subject || "";
                const codeMatch = emailText.match(/\d{6}/); 
                
                if (codeMatch) {
                    document.getElementById('code-display').style.color = "#27ae60";
                    document.getElementById('code-display').innerText = "SUCCESS\nOTP Code: " + codeMatch[0];
                } else {
                    document.getElementById('code-display').style.color = "#c0392b";
                    document.getElementById('code-display').innerText = "Target code pattern not matched in email content. Raw response:\n" + textData;
                }
            } else if (data.error) {
                document.getElementById('code-display').style.color = "#c0392b";
                document.getElementById('code-display').innerText = `API Error: ${data.error}\nDetails: ${data.detail || 'None'}`;
            } else {
                document.getElementById('code-display').style.color = "#c0392b";
                document.getElementById('code-display').innerText = "No matching emails found using token access.";
            }
        } catch(e) {
            document.getElementById('code-display').style.color = "#c0392b";
            document.getElementById('code-display').innerText = "Server Response (Non-JSON):\n" + textData;
        }
    } catch (error) {
        document.getElementById('code-display').style.color = "#c0392b";
        document.getElementById('code-display').innerText = "Network Failure: " + error.message;
    }
}
</script>

</body>
</html>
