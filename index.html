            font-size: 32px;
            font-weight: bold;

            letter-spacing: 4px;

        }
        .otp-code:hover {
            background:

            text-align: center;

            background:

        }
        .parsed-info.show {
            display: block;

</head>
<body>
    <div class="container">
        <h1>🔐 Outlook OTP Extractor</h1>
        <p class="subtitle">Paste your credentials to extract Facebook/Instagram OTP</p>
        
        <div class="input-group">
            <label>📋 Paste Credentials:</label>
            <textarea id="credentials" placeholder="email|password|token|uuid"></textarea>
            <div class="format-hint">Format: email|password|token|uuid</div>
        </div>
        
        <div class="parsed-info" id="parsedInfo"></div>
        
        <button id="extractBtn">Extract OTP</button>
        
        <div class="loading" id="loading">
            <p>⏳ Fetching OTP from Outlook...</p>
        </div>
        
        <div class="result" id="result">
            <h3>✅ OTP Found:</h3>
            <div class="otp-code" id="otpCode" title="Click to copy"></div>
            <p class="copy-hint">✓ Code copied to clipboard!</p>
        </div>
        
        <div class="error" id="error"></div>
    </div>

    <script>
        // 🚀 Backend API URL
        const API_URL = 'https://your-backend.onrender.com/api/get-otp';
        
        // Auto-parse on paste
        document.getElementById('credentials').addEventListener('paste', (e) => {
            setTimeout(() => {
                parseCredentials();
            }, 100);
        });
        
        // Parse credentials
        function parseCredentials() {
            const input = document.getElementById('credentials').value.trim();
            const parts = input.split('|');
            
            if (parts.length >= 2) {
                const email = parts[0];
                const password = parts[1];
                const token = parts[2] || '';
                const uuid = parts[3] || '';
                
                const info = document.getElementById('parsedInfo');
                info.innerHTML = `
                    <strong>📧 Email:</strong> ${email}<br>
                    <strong>🔑 Password:</strong> ${'*'.repeat(password.length)}<br>
                    ${token ? `<strong>🎫 Token:</strong> ${token.substring(0, 20)}...<br>` : ''}
                    ${uuid ? `<strong>🆔 UUID:</strong> ${uuid}` : ''}
                `;
                info.classList.add('show');
            }
        }
        
        // Extract OTP
        document.getElementById('extractBtn').addEventListener('click', async () => {
            const input = document.getElementById('credentials').value.trim();
            const parts = input.split('|');
            
            if (parts.length < 2) {
                showError('❌ Invalid format! Use: email|password|token|uuid');
                return;
            }
            
            const email = parts[0];
            const password = parts[1];
            const token = parts[2] || '';
            
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const btn = document.getElementById('extractBtn');
            
            // Reset
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');
            btn.disabled = true;
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, token })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    const otpCode = document.getElementById('otpCode');
                    otpCode.textContent = data.otp;
                    result.classList.add('show');
                    
                    // Auto-copy to clipboard
                    navigator.clipboard.writeText(data.otp);
                    
                    // Click to copy again
                    otpCode.addEventListener('click', () => {
                        navigator.clipboard.writeText(data.otp);
                        otpCode.style.background = '
';
                        setTimeout(() => {
                            otpCode.style.background = 'white';
                        }, 300);
                    });
                } else {
                    showError('❌ ' + data.error);
                }
            } catch (err) {
                showError('❌ Network error: ' + err.message);
            } finally {
                loading.classList.remove('show');
                btn.disabled = false;
            }
        });
        
        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('show');
        }
    </script>
</body>
</html>
