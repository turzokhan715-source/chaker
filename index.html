<body>
    <div class="container">
        <h1>🔐 FB/IG OTP Extractor</h1>
        <p class="subtitle">Microsoft Graph API</p>

        <div class="info-box">
            <strong>📋 Format:</strong> email|password|token|uuid<br>
            <strong>🔑 Token:</strong> Microsoft Graph Access Token
        </div>

        <div class="tabs">
            <div class="tab active" data-platform="facebook">📘 Facebook</div>
            <div class="tab" data-platform="instagram">📷 Instagram</div>
        </div>

        <div class="input-group">
            <label for="credentials">Paste Credentials:</label>
            <textarea id="credentials" placeholder="email|password|token|uuid"></textarea>
        </div>

        <button id="extractBtn">🚀 Get Verification Code</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Fetching emails...</p>
        </div>

        <div class="result" id="result"></div>

        <div class="history" id="historySection" style="display: none;">
            <h3>📜 History</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let selectedPlatform = 'facebook';
        let history = [];

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                selectedPlatform = tab.dataset.platform;
            });
        });

        document.getElementById('extractBtn').addEventListener('click', async () => {
            const credentials = document.getElementById('credentials').value.trim();
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const extractBtn = document.getElementById('extractBtn');

            if (!credentials) {
                showResult('error', '❌ Please paste credentials!');
                return;
            }

            const parts = credentials.split('|');
            if (parts.length < 3) {
                showResult('error', '❌ Invalid format! Use: email|password|token|uuid');
                return;
            }

            const [email, password, token, uuid] = parts;

            if (!token || token.length < 20) {
                showResult('error', '❌ Invalid or missing access token!');
                return;
            }

            resultDiv.style.display = 'none';
            loadingDiv.classList.add('active');
            extractBtn.disabled = true;

            try {
                console.log('🔍 Fetching emails for:', email);

                const response = await fetch('http://localhost:3000/api/extract-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, token, uuid, platform: selectedPlatform })
                });

                const data = await response.json();

                if (response.ok && data.otp) {
                    console.log('🎉 OTP Found:', data.otp);
                    showResult('success', `
                        <div style="text-align: center;">
                            <div style="font-size: 16px; margin-bottom: 10px;">✅ OTP Found!</div>
                            <div class="otp-display">${data.otp}</div>
                            <span class="platform-badge ${data.platform}">${data.platform.toUpperCase()}</span>
                        </div>
                    `);

                    navigator.clipboard.writeText(data.otp);
                    addToHistory(email, data.otp, data.platform);
                } else {
                    showResult('error', data.error || '❌ No OTP found');
                }
            } catch (error) {
                console.error('❌ Error:', error);
                showResult('error', `❌ Connection failed<br><small>Make sure backend is running on port 3000</small>`);
            } finally {
                loadingDiv.classList.remove('active');
                extractBtn.disabled = false;
            }
        });

        function showResult(type, message) {
            const resultDiv = document.getElementById('result');
            resultDiv.className = `result ${type}`;
            resultDiv.innerHTML = message;
        }

        function addToHistory(email, otp, platform) {
            history.unshift({ email, otp, platform, time: new Date().toLocaleTimeString() });
            if (history.length > 5) history.pop();

            document.getElementById('historySection').style.display = 'block';
            document.getElementById('historyList').innerHTML = history.map(item => `
                <div class="history-item">
                    <div>
                        <div style="font-weight: 600; margin-bottom: 4px;">${item.email}</div>
                        <div class="otp">${item.otp} <span class="platform-badge ${item.platform}" style="font-size: 10px; padding: 3px 8px;">${item.platform}</span></div>
                        <div style="color: #999; font-size: 11px; margin-top: 4px;">${item.time}</div>
                    </div>
                    <button class="copy-btn" onclick="copyOTP('${item.otp}')">📋</button>
                </div>
            `).join('');
        }

        function copyOTP(otp) {
            navigator.clipboard.writeText(otp);
            alert('✅ Copied: ' + otp);
        }
    </script>
