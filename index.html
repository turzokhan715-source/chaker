<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Outlook OTP Extractor</h1>
            <p>Extract Facebook/Instagram verification codes instantly</p>
        </div>

        <div class="tabs">
            <button class="tab active" data-platform="facebook">
                📘 Facebook
            </button>
            <button class="tab" data-platform="instagram">
                📷 Instagram
            </button>
        </div>

        <div class="input-section">
            <label>📋 Paste Account Credentials:</label>
            <textarea id="credentials" placeholder="email|password|token|uuid"></textarea>
            <div class="format-hint">Format: email|password|token|uuid</div>
        </div>

        <div class="parsed-info" id="parsedInfo"></div>

        <button class="extract-btn" id="extractBtn">🚀 Get Verification Code</button>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">⏳ Fetching verification code from Outlook...</p>
        </div>

        <div class="result" id="result">
            <h3>✅ Verification Code Retrieved</h3>
            <div class="otp-display">
                <div class="otp-code" id="otpCode">------</div>
                <button class="copy-btn" id="copyBtn">📋 Copy</button>
            </div>
            <div class="otp-meta" id="otpMeta"></div>
        </div>

        <div class="error" id="error"></div>
    </div>

    <script>
        // API Configuration
        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:3000/api/extract-otp'
            : 'https://your-backend.onrender.com/api/extract-otp';

        let selectedPlatform = 'facebook';

        // Platform tabs
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                selectedPlatform = tab.dataset.platform;
            });
        });

        // Auto-parse credentials
        const credInput = document.getElementById('credentials');
        credInput.addEventListener('input', parseCredentials);
        credInput.addEventListener('paste', () => setTimeout(parseCredentials, 100));

        function parseCredentials() {
            const input = credInput.value.trim();
            const parts = input.split('|');

            if (parts.length >= 2) {
                const email = parts[0];
                const password = parts[1];
                const token = parts[2] || '';
                const uuid = parts[3] || '';

                const info = document.getElementById('parsedInfo');
                info.innerHTML = `
                    <strong>📧 Email:</strong> ${email}<br>
                    <strong>🔑 Password:</strong> ${'•'.repeat(Math.min(password.length, 20))}<br>
                    ${token ? `<strong>🎫 Token:</strong> ${token.substring(0, 50)}...<br>` : ''}
                    ${uuid ? `<strong>🆔 UUID:</strong> ${uuid}` : ''}
                `;
                info.classList.add('show');
            } else {
                document.getElementById('parsedInfo').classList.remove('show');
            }
        }

        // Extract OTP
        document.getElementById('extractBtn').addEventListener('click', async () => {
            const input = credInput.value.trim();
            const parts = input.split('|');

            if (parts.length < 2) {
                showError('❌ Invalid format! Please use: email|password|token|uuid');
                return;
            }

            const [email, password, token, uuid] = parts;

            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const error = document.getElementById('error');
            const btn = document.getElementById('extractBtn');

            // Reset UI
            result.classList.remove('show');
            error.classList.remove('show');
            loading.classList.add('show');
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password,
                        token: token || null,
                        uuid: uuid || null,
                        platform: selectedPlatform
                    })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('otpCode').textContent = data.otp;
                    document.getElementById('otpMeta').innerHTML = `
                        <strong>From:</strong> ${data.from}<br>
                        <strong>Subject:</strong> ${data.subject}<br>
                        <strong>Received:</strong> ${new Date(data.receivedAt).toLocaleString()}
                    `;
                    result.classList.add('show');

                    // Auto-copy to clipboard
                    await navigator.clipboard.writeText(data.otp);
                } else {
                    showError('❌ ' + (data.error || 'Failed to retrieve verification code'));
                }
            } catch (err) {
                showError('❌ Connection failed: ' + err.message + '\n\nMake sure the backend server is running!');
            } finally {
                loading.classList.remove('show');
                btn.disabled = false;
            }
        });

        // Copy button
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const otp = document.getElementById('otpCode').textContent;
            const btn = document.getElementById('copyBtn');
            
            await navigator.clipboard.writeText(otp);
            btn.textContent = '✓ Copied!';
            btn.classList.add('copied');
            
            setTimeout(() => {
                btn.textContent = '📋 Copy';
                btn.classList.remove('copied');
            }, 2000);
        });

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.classList.add('show');
        }
    </script>
</body>
