<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification Code Retriever</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans p-6">

    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md overflow-hidden">
        <div class="flex border-b">
            <button class="w-1/2 py-3 text-center font-semibold text-gray-500 bg-gray-50 border-r hover:bg-gray-100">
                <i class="fab fa-google text-red-500 mr-2"></i> Gmail
            </button>
            <button class="w-1/2 py-3 text-center font-semibold text-blue-600 bg-white border-b-2 border-blue-600">
                <i class="fab fa-windows text-blue-500 mr-2"></i> Hotmail/Outlook
            </button>
        </div>

        <div class="p-6">
            <div class="flex items-center space-x-2 text-gray-800 font-bold text-lg mb-4">
                <span>@</span>
                <h2>Get Hotmail/Outlook Verification Code</h2>
            </div>

            <label class="block text-gray-700 text-sm font-semibold mb-2">Account Details</label>
            <textarea 
                id="accountInput"
                class="w-full h-32 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                placeholder="email|password|refresh_token|client_id"
            ></textarea>

            <div class="text-xs text-gray-500 mt-2 space-y-1">
                <p><i class="fas fa-info-circle"></i> Format: <span class="bg-gray-200 px-1 rounded">email|password|refresh_token|client_id</span></p>
                <p><i class="fas fa-envelope"></i> Supports @hotmail.com, @outlook.com, @live.com addresses</p>
            </div>

            <div class="mt-4 p-4 bg-blue-50 border border-blue-100 rounded-lg flex justify-between items-center">
                <div>
                    <span class="text-xs text-blue-600 block font-medium">Extracted Email:</span>
                    <span id="extractedEmail" class="text-blue-900 font-bold">Waiting for input...</span>
                </div>
                <button onclick="copyText('extractedEmail')" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-sm font-semibold hover:bg-blue-700 transition">
                    <i class="fas fa-copy mr-1"></i> Copy Email
                </button>
            </div>

            <button id="getBtn" onclick="processVerification()" class="w-full mt-4 bg-blue-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-blue-700 transition shadow-md">
                Get Verification Code
            </button>
        </div>
    </div>

    <div id="resultSection" class="max-w-2xl mx-auto mt-6 bg-white rounded-lg shadow-md p-6 border-t-4 border-gray-300 hidden">
        <div id="statusBox" class="bg-gray-50 border border-gray-100 p-4 rounded-lg mb-4">
            <p id="statusText" class="font-bold text-gray-700"><i class="fas fa-spinner fa-spin"></i> Processing...</p>
            <p class="text-sm text-gray-600 mt-1">For: <span id="targetEmail" class="font-medium">-</span></p>
        </div>

        <div class="border-2 border-blue-500 rounded-lg p-4 flex justify-between items-center bg-blue-50/30">
            <div>
                <span class="text-xs text-gray-500 block">Verification Code:</span>
                <span id="vCode" class="text-3xl font-bold text-blue-700 tracking-wider">XXXXX</span>
            </div>
            <button onclick="copyText('vCode')" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                <i class="fas fa-copy mr-1"></i> Copy Code
            </button>
        </div>
    </div>

    <script>
        document.getElementById('accountInput').addEventListener('input', function(e) {
            const value = e.target.value.trim();
            if(value.includes('|')) {
                const email = value.split('|')[0];
                document.getElementById('extractedEmail').innerText = email;
            }
        });

        async function processVerification() {
            const rawInput = document.getElementById('accountInput').value.trim();
            const resultSection = document.getElementById('resultSection');
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            const targetEmail = document.getElementById('targetEmail');
            const vCode = document.getElementById('vCode');

            if(!rawInput) {
                alert('Please enter account details first!');
                return;
            }

            resultSection.classList.remove('hidden');
            resultSection.style.borderColor = '#cbd5e1'; 
            statusBox.className = "bg-gray-50 border border-gray-100 p-4 rounded-lg mb-4";
            statusText.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Connecting to Mail Server...';
            vCode.innerText = 'XXXXX';

            try {
                const response = await fetch('/get-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ raw_input: rawInput })
                });

                const data = await response.json();

                if(data.status === 'success') {
                    targetEmail.innerText = data.email;
                    vCode.innerText = data.code;
                    
                    resultSection.style.borderColor = '#22c55e'; 
                    statusBox.className = "bg-green-50 border border-green-100 p-4 rounded-lg mb-4";
                    statusText.innerHTML = '<i class="fas fa-check-circle text-green-500 mr-2"></i> Email Retrieved Successfully';
                } else {
                    resultSection.style.borderColor = '#ef4444'; 
                    statusBox.className = "bg-red-50 border border-red-100 p-4 rounded-lg mb-4";
                    statusText.innerHTML = `<i class="fas fa-times-circle text-red-500 mr-2"></i> ${data.message}`;
                }
            } catch (error) {
                resultSection.style.borderColor = '#ef4444';
                statusText.innerHTML = '<i class="fas fa-times-circle text-red-500 mr-2"></i> Connection Error!';
            }
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            if(text !== 'XXXXX' && text !== 'Waiting for input...') {
                navigator.clipboard.writeText(text);
                alert('Code copied to clipboard!');
            }
        }
    </script>
</body>
</html>
